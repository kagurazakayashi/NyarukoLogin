# ==========================================================
# NATS 核心伺服器配置
# ==========================================================

# 伺服器名稱，在叢集中必須唯一
server_name: "NyaNATS_Dev_Server"

# 監聽地址和埠
# 4222 是 NATS 預設埠
host: "127.0.0.1"
port: 4222

# HTTP 監控埠
# 生產環境下可以透過瀏覽器訪問 http://localhost:8222 檢視伺服器狀態、連線數等
http_port: 8222

# ==========================================================
# 日誌配置 (Logging)
# ==========================================================

# 開啟除錯日誌（生產環境建議只開 info，排查問題時開 debug）
debug: true
# 開啟跟蹤日誌（會記錄原始協議報文，非常詳細，極度耗效能，僅限本地開發）
trace: true
# 日誌記錄時間戳
logtime: true

# 將日誌輸出到檔案（如果不指定，預設輸出到控制檯）
log_file: "logs/nats-server.log"

# ==========================================================
# 安全與認證 (Authentication)
# ==========================================================

authorization {
  users: [
    {
      # 負責提供對外 HTTP API 的程式
      user: "webapi",
      password: "Ohr1biolei4aeD3eu7isaeyie9di4uuf",
      permissions: {
        # ">" 是 NATS 的全域性萬用字元，表示匹配所有層級的主題
        publish: ["test_req", "user_valid_req", "_INBOX.>"],
        subscribe: ["_INBOX.>", "test_req", "user_valid_req"]
      }
    }
  ]
}

# ==========================================================
# 效能限制 (Limits)
# ==========================================================

# 允許的最大載荷（單個訊息大小），預設 1MB。生產環境常根據業務調大。
max_payload: 2MB

# 最大連線數
max_connections: 1000

# 客戶端寫緩衝區大小
max_pending: 10MB

# ==========================================================
# JetStream 持久化 (生產環境核心)
# ==========================================================

# 如果你需要訊息持久化（即使 NATS 重啟訊息也不丟），需要開啟 JetStream
jetstream {
    # 儲存路徑
    store_dir: "./nats_data"
    
    # 記憶體儲存限制
    max_memory_store: 1GB
    
    # 磁碟儲存限制
    max_file_store: 10GB
}