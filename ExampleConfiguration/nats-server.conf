# ==========================================================
# NATS 核心伺服器配置
# ==========================================================

# 伺服器名稱，在叢集中必須唯一
server_name: "NyaNATS_Dev_Server"

# 監聽地址和埠
# 4222 是 NATS 預設埠
host: "127.0.0.1"
port: 4222

# HTTP 監控埠
# 生產環境下可以透過瀏覽器訪問 http://localhost:8222 檢視伺服器狀態、連線數等
http_port: 8222

# ==========================================================
# 日誌配置 (Logging)
# ==========================================================

# 開啟除錯日誌（生產環境建議只開 info，排查問題時開 debug）
debug: true
# 開啟跟蹤日誌（會記錄原始協議報文，非常詳細，極度耗效能，僅限本地開發）
trace: true
# 日誌記錄時間戳
logtime: true

# 將日誌輸出到檔案（如果不指定，預設輸出到控制檯）
log_file: logs/nats-server.log

# ==========================================================
# 安全與認證 (Authentication)
# ==========================================================

authorization {
  users: [
    {
      # HTTP API 橋接器 (ApiNatsBridge)
      # 將 HTTP 請求發布至 /auth/login 與 /auth/verify，並接收 _INBOX 回應
      user: "webapi",
      password: "4GDrC8gywHEgcnkNpyGBq8sSHwWGdAeV",
      permissions: {
        # | 操作               | publish (发) | subscribe (收) |
        # | ------------------ | ------------ | -------------- |
        # | 发布驗證/核實請求   | `/auth/*`    | -              |
        # | 接收 NATS Reply    | -            | `_INBOX.>`     |
        publish: ["/auth/login", "/auth/verify"],
        subscribe: ["_INBOX.>"]
      }
    }
    {
      # 登入狀態驗證服務 (UserValidator)
      # 訂閱 /auth/login 與 /auth/verify 接收 ApiNatsBridge 轉發的請求
      # 透過 NATS Request 向 db_request 發送驗證請求並接收 INBOX 回應
      user: "userauth",
      password: "",
      permissions: {
        # | 操作               | publish (发) | subscribe (收) |
        # | ------------------ | ------------ | -------------- |
        # | 响应 ApiNatsBridge | `_INBOX.>`   | `/auth/*`      |
        # | 调用 gateway-db    | `db_request` | `_INBOX.>`     |
        publish: ["db_request", "_INBOX.>"],
        subscribe: ["/auth/login", "/auth/verify", "_INBOX.>"]
      }
    }
  ]
}

# ==========================================================
# 效能限制 (Limits)
# ==========================================================

# 允許的最大載荷（單個訊息大小），預設 1MB。生產環境常根據業務調大。
max_payload: 2MB

# 最大連線數
max_connections: 1000

# 客戶端寫緩衝區大小
max_pending: 10MB

# ==========================================================
# JetStream 持久化 (生產環境核心)
# ==========================================================

# 如果你需要訊息持久化（即使 NATS 重啟訊息也不丟），需要開啟 JetStream
jetstream {
    # 儲存路徑
    store_dir: "./nats_data"
    
    # 記憶體儲存限制
    max_memory_store: 1GB
    
    # 磁碟儲存限制
    max_file_store: 10GB
}