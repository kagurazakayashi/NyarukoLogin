# ============================================================
# UserValidator 設定檔
# 本檔案以 YAML 格式定義 NATS 連線、訂閱主題與 PASETO 令牌參數
# ============================================================

# ----------------------------------------------------------
# NATS 伺服器連線設定 (nats_config)
# 所有欄位皆為選填，未填寫時使用預設值
# ----------------------------------------------------------
nats_config:
  # NATS 伺服器主機位址 (預設: 127.0.0.1)
  nats_server_host: 127.0.0.1
  # NATS 伺服器埠號 (預設: 4222)
  nats_server_port: 4222
  # 連線驗證使用者名稱 (預設: 空，不認證)
  nats_user: userauth
  # 連線驗證密碼 (預設: 空)
  nats_password: 
  # 此用戶端在 NATS 伺服器上顯示的名稱 (預設: 自動產生 UUID)
  nats_client_name: UserValidator
  # 連線中斷後最大重新連線次數 (預設: 5)
  nats_max_reconnects: 5
  # 每次重新連線之間的等待秒數 (預設: 2)
  nats_reconnect_wait: 2
  # 初始連線逾時秒數 (預設: 10)
  nats_connect_timeout: 10
  # 全域加密金鑰，長度必須為 16、24 或 32 bytes
  # 對應 AES-128、AES-192 或 AES-256
  nats_encryption_key: ""
  # 針對特定主題的獨立加密金鑰
  # 格式: 主題名稱: 金鑰字串
  #   - 若匹配則優先使用，無匹配時回退至全域金鑰 (nats_encryption_key)
  #   - 值設為空字串 "" 則該主題以明文傳輸
  nats_theme_keys:
    "/auth/login": "GHZ7coaA2TUHW8j3LupM4WfKHdElBa2a"
    "/auth/verify": "44SonGMeTmkHaGtfVNAg2pF65mhKu7jL"
    "auth.token.verify": "bN4cF6dG0aMXk9mP2wQ7vR3nL8jH5tY1"

# ----------------------------------------------------------
# NATS 訂閱主題列表 (nats_subjects)
# UserValidator 會為每個主題建立獨立訂閱，主题名即等於路由路徑
# ----------------------------------------------------------
nats_subjects:
  - "/auth/login"
  - "/auth/verify"

# ----------------------------------------------------------
# 直接 NATS 訂閱主题列表 (nats_subjects_direct)
# 這些主题不經 HTTP 橋接層，其他微服務可直接透過 NATS Request 發送純 JSON 訊息
# 與 nats_subjects 不同，訊息格式為請求本身，而非包在 bridgeRequest 內
# ----------------------------------------------------------
nats_subjects_direct:
  - "auth.token.verify"

# ----------------------------------------------------------
# 對外發布訊息設定 (nats_publish)
# 用於向 gateway-db 資料控制微服務發送請求
# UserValidator 會透過 NATS Request/Reply 模式發送 user.login 請求
# ----------------------------------------------------------
nats_publish:
  # NATS 主题名稱，對應 gateway-db 的 nats_publish 設定 (預設: "db_request")
  db_request_subject: "db_request"
  # 資料庫請求逾時時間，格式為 Go duration 字串 (預設: "5s")
  db_request_timeout: "5s"
  # 附加到資料庫請求頂層的額外欄位（鍵值對字典，選填）
  # 此處設定的每個鍵值對會直接合併到發送給 gateway-db 的 JSON 請求頂層
  # db_request_extra:
  #   app_id: "user-validator"

# ----------------------------------------------------------
# PASETO 密鑰環 (paseto_secret_key)
# 用於對令牌進行對稱式加密 (local purpose)
#
# 支援兩種格式：
#   A. 舊格式（單一金鑰，向後相容）：
#        paseto_secret_key: "404142..."
#
#   B. 新格式（金鑰輪替字典，推薦）：
#        paseto_secret_key:
#          1748736000: "404142..."
#          1779840000: "606162..."
#
# 格式 B 中，鍵值為 UNIX 整數時間戳，作為金鑰識別碼 (key ID)
#   - 簽發新令牌時，自動使用時間戳最大（最新）的金鑰
#   - 驗證令牌時，會依序嘗試所有金鑰（由新到舊），任一解密成功即接受
#   - 金鑰輪替後，舊令牌仍可驗證，直到從設定中移除對應的舊金鑰
#
# 每把金鑰必須為 64 個十六進位字元，換算為 32 bytes (256-bit)
# 產生新密鑰的指令 (PowerShell):
#   -join ((1..32) | ForEach-Object { '{0:X2}' -f (Get-Random -Max 256) })
# ----------------------------------------------------------
paseto_secret_key:
  1748736000: "404142434445464748494a4b4c4d4e4f505152535455565758595a5b5c5d5e5f"
  # 1779840000: "606162636465666768696a6b6c6d6e6f707172737475767778797a7b7c7d7e7f"

# ----------------------------------------------------------
# PASETO 令牌參數設定 (paseto_config)
# 所有欄位皆為選填，未填寫時使用預設值
# ----------------------------------------------------------
paseto_config:
  # PASETO 協定版本 (預設: "v2")
  # 可選值:
  #   - "v1": 相容性最佳，使用 AES-256-CTR + HMAC-SHA-384
  #   - "v2": 推薦使用，使用 XChaCha20-Poly1305，安全性更優
  paseto_version: "v2"

  # 令牌預設有效時長 (預設: "24h")
  # 當登入請求未提供 expires 時使用此值
  # 格式為 Go duration 字串，範例:
  #   - "15m"   = 15 分鐘
  #   - "1h"    = 1 小時
  #   - "2h"    = 2 小時（生產環境推薦，兼顧安全性與使用者體驗）
  #   - "24h"   = 24 小時（開發階段適用）
  #   - "168h"  = 168 小時 (7 天)
  #   - "720h"  = 720 小時 (30 天)
  # 若格式無效或值小於等於零，自動回退為 "24h"
  token_ttl: "24h"

  # 令牌最大有效時長上限 (預設: 以 token_ttl 為上限)
  # 限制登入請求中 expires 參數不得超過此值
  # 用途: 防止客戶端請求過長的令牌有效期，作為安全性保護
  # 格式為 Go duration 字串，設為空或不填則以 token_ttl 為上限
  # 範例: "168h" (客戶端最多可請求 7 天的令牌)
  max_token_ttl: ""

# ----------------------------------------------------------
# 令牌 Claims 與上游資料欄位映射 (token_claims_mapping)
# 設定令牌中各個 claim 對應到上游服務 (gateway-db) 回傳資料中的哪個欄位
# 所有欄位皆為選填，空白或未設定時沿用預設行為：
#   - sub: 預設使用登入請求中的 username
#   - iss: 預設使用請求路徑 (如 "/auth/login")
#   - aud: 預設使用登入請求中的 app
#
# 注意：僅 sub / iss / aud 三個 claims 可透過上游資料覆蓋
#       iat、nbf、exp、jti、kid 為系統自動計算，不可映射
# ----------------------------------------------------------
# token_claims_mapping:
#   sub: "id"           # 上游的 "id" 欄位 → token sub claim
#   iss: ""             # 空字串：不從上游映射，使用請求路徑
#   aud: ""             # 空字串：不從上游映射，使用登入請求的 app
