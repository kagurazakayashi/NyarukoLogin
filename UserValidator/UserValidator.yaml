# ============================================================
# UserValidator 設定檔
# 本檔案以 YAML 格式定義 NATS 連線、訂閱主題與 PASETO 令牌參數
# ============================================================

# ----------------------------------------------------------
# NATS 伺服器連線設定 (nats_config)
# 所有欄位皆為選填，未填寫時使用預設值
# ----------------------------------------------------------
nats_config:
  # NATS 伺服器主機位址 (預設: 127.0.0.1)
  nats_server_host: 127.0.0.1
  # NATS 伺服器埠號 (預設: 4222)
  nats_server_port: 4222
  # 連線驗證使用者名稱 (預設: 空，不認證)
  nats_user: userauth
  # 連線驗證密碼 (預設: 空)
  nats_password: 
  # 此用戶端在 NATS 伺服器上顯示的名稱 (預設: 自動產生 UUID)
  nats_client_name: UserValidator
  # 連線中斷後最大重新連線次數 (預設: 5)
  nats_max_reconnects: 5
  # 每次重新連線之間的等待秒數 (預設: 2)
  nats_reconnect_wait: 2
  # 初始連線逾時秒數 (預設: 10)
  nats_connect_timeout: 10
  # 全域加密金鑰，長度必須為 16、24 或 32 bytes
  # 對應 AES-128、AES-192 或 AES-256
  nats_encryption_key: ""
  # 針對特定主題的獨立加密金鑰
  # 格式: 主題名稱: 金鑰字串
  #   - 若匹配則優先使用，無匹配時回退至全域金鑰 (nats_encryption_key)
  #   - 值設為空字串 "" 則該主題以明文傳輸
  nats_theme_keys:
    "/auth/login": ""
    "/auth/verify": ""

# ----------------------------------------------------------
# NATS 訂閱主題列表 (nats_subjects)
# UserValidator 會為每個主題建立獨立訂閱，主题名即等於路由路徑
# ----------------------------------------------------------
nats_subjects:
  - "/auth/login"
  - "/auth/verify"

# ----------------------------------------------------------
# 對外發布訊息設定 (nats_publish)
# 用於向 gateway-db 資料控制微服務發送請求
# UserValidator 會透過 NATS Request/Reply 模式發送 user.login 請求
# ----------------------------------------------------------
nats_publish:
  # NATS 主题名稱，對應 gateway-db 的 nats_publish 設定 (預設: "db_request")
  db_request_subject: "db_request"
  # 資料庫請求逾時時間，格式為 Go duration 字串 (預設: "5s")
  db_request_timeout: "5s"

# ----------------------------------------------------------
# PASETO 密鑰 (paseto_secret_key)
# 用於對令牌進行對稱式加密 (local purpose)
# 必須為 64 個十六進位字元，換算為 32 bytes (256-bit)
# 產生新密鑰的指令 (PowerShell):
#   -join ((1..32) | ForEach-Object { '{0:X2}' -f (Get-Random -Max 256) })
# ----------------------------------------------------------
paseto_secret_key: "404142434445464748494a4b4c4d4e4f505152535455565758595a5b5c5d5e5f"

# ----------------------------------------------------------
# PASETO 令牌參數設定 (paseto_config)
# 所有欄位皆為選填，未填寫時使用預設值
# ----------------------------------------------------------
paseto_config:
  # PASETO 協定版本 (預設: "v2")
  # 可選值:
  #   - "v1": 相容性最佳，使用 AES-256-CTR + HMAC-SHA-384
  #   - "v2": 推薦使用，使用 XChaCha20-Poly1305，安全性更優
  paseto_version: "v2"

  # 令牌預設有效時長 (預設: "24h")
  # 當登入請求未提供 expires 時使用此值
  # 格式為 Go duration 字串，範例:
  #   - "15m"   = 15 分鐘
  #   - "1h"    = 1 小時
  #   - "2h"    = 2 小時（生產環境推薦，兼顧安全性與使用者體驗）
  #   - "24h"   = 24 小時（開發階段適用）
  #   - "168h"  = 168 小時 (7 天)
  #   - "720h"  = 720 小時 (30 天)
  # 若格式無效或值小於等於零，自動回退為 "24h"
  token_ttl: "24h"

  # 令牌最大有效時長上限 (預設: 以 token_ttl 為上限)
  # 限制登入請求中 expires 參數不得超過此值
  # 用途: 防止客戶端請求過長的令牌有效期，作為安全性保護
  # 格式為 Go duration 字串，設為空或不填則以 token_ttl 為上限
  # 範例: "168h" (客戶端最多可請求 7 天的令牌)
  max_token_ttl: ""

  # 令牌簽發者 (iss claim) (預設: 空，不設定)
  # 建議填寫服務名稱以利於審計，如 "NyarukoLogin-UserValidator"
  issuer: ""

  # 令牌受眾 (aud claim) (預設: 空，不設定)
  # 用於限制令牌使用範圍，如指定接收服務的名稱
  audience: ""

  # 令牌生效時間偏移 (預設: "0s")
  # 控制令牌從簽發後多久才開始生效
  # 格式為 Go duration 字串，範例:
  #   - "0s"   = 立即生效 (不設定 NotBefore)
  #   - "5m"   = 簽發後 5 分鐘才生效
  #   - "1h"   = 簽發後 1 小時才生效
  not_before: "0s"

  # 是否為每個令牌產生唯一識別碼 (jti claim) (預設: false)
  # 用途: 用於令牌撤銷、審計追蹤、防止重放攻擊
  # 啟用後每個令牌會附加一個 UUID v4 的 jti 欄位
  enable_jti: true

  # 自訂 Footer 明文字串 (預設: 空，不附加)
  # Footer 內容為明文（不加密），可在不解密令牌的情況下讀取
  # 適用於存放公開中繼資料，如金鑰輪替 ID、環境標籤等
  # 注意: Footer 驗證依賴於 PASETO 的整體完整性保護，不可單獨校驗
  footer: ""

# ----------------------------------------------------------
# 令牌 Claims 與上游資料欄位映射 (token_claims_mapping)
# 設定令牌中各個 claim 對應到上游服務 (gateway-db) 回傳資料中的哪個欄位
# 所有欄位皆為選填，空白或未設定時沿用預設行為：
#   - sub: 預設使用登入請求中的 username
#   - iss / aud: 預設使用上方 paseto_config 的 issuer / audience
#   - jti: 預設依 enable_jti 設定自動生成 UUID
#   - 自訂 claims (username, app): 預設使用登入請求中的值
# 注意：exp (過期時間)、iat (簽發時間)、nbf (生效時間) 為系統時間類，
#       總是由系統根據當前時間與 paseto_config 自動計算，無法從上游映射
# ----------------------------------------------------------
# token_claims_mapping:
#   # --- 標準 claims 映射 ---
#   # sub: "id"           # 上游的 "id" 欄位 → token sub claim
#   # iss: ""             # 空字串：不從上游映射，使用 paseto_config.issuer
#   # aud: ""             # 空字串：不從上游映射，使用 paseto_config.audience
#   # jti: ""             # 空字串：不從上游映射，由 enable_jti 控制
#
#   # --- 自訂 claims 映射 ---
#   # 格式: <token claim 名>: <上游資料欄位名>
#   # custom:
#   #   nickname: "nickname"
#   #   group: "group"
#   #   permissions: "permissions"
#   #   id: "id"
